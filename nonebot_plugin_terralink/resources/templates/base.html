<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraLink Render</title>
    <link rel="stylesheet" href="{{ css_path }}/style.css">
</head>
<body>
    <div class="tml-panel">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@poppanator/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
        twemoji.parse(document.body, {
            folder: 'svg',
            ext: '.svg',
            base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
        });
    </script>
</body>
</html>
